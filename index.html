<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>love you</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050005;
            overflow: hidden;
            display: flex;
            justify-content: center; 
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let rainDrops = [];
        const pinkColors = ["#FFB6C1", "#FF69B4", "#FF1493", "#FF007F", "#DB7093"];
        const phrases = ["love", "I love you", "forever", "珊", "行也思君", "坐也思君", "V", "E"];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initRain();
        }

        window.addEventListener('resize', resize);

        // ---
        function initRain() {
            rainDrops = [];
            const columns = Math.floor(width / 6); 
            for (let i = 0; i < columns; i++) {
                rainDrops[i] = {
                    x: i * 6,
                    // 修改点：初始 y 坐标随机分布在 0 到 height 之间
                    y: Math.random() * height, 
                    speed: 0.1 + Math.random() * 0.35,
                    text: phrases[Math.floor(Math.random() * phrases.length)],
                    color: pinkColors[Math.floor(Math.random() * pinkColors.length)],
                    opacity: 0.05 + Math.random() * 0.15,
                    fontSize: 8 + Math.random() * 5
                };
            }
        }

        function drawRain() {
            ctx.save();
            for (let i = 0; i < rainDrops.length; i++) {
                const drop = rainDrops[i];
                ctx.fillStyle = drop.color;
                ctx.globalAlpha = drop.opacity;
                ctx.font = `${drop.fontSize}px Arial`;
                ctx.fillText(drop.text, drop.x, drop.y);
                drop.y += drop.speed;
                // 当掉出屏幕后，重置回上方
                if (drop.y > height) drop.y = -20;
            }
            ctx.restore();
        }

        // --- 2. 核心：精致小巧的3D粒子心 ---
        const settings = {
            particleCount: 2000, 
            heartSize: 10,       
            eyeDistance: 500
        };

        function getHeartPoint(t, r) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * r, y: y * r };
        }

        class Particle {
            constructor() {
                this.isOutline = Math.random() > 0.2; 
                this.t = Math.random() * Math.PI * 2;
                const r = this.isOutline ? (0.96 + Math.random() * 0.08) : (Math.random() * 0.9);
                const pos = getHeartPoint(this.t, r);
                this.origX = pos.x;
                this.origY = pos.y;
                this.origZ = (Math.random() - 0.5) * (this.isOutline ? 8 : 15);
                this.size = this.isOutline ? (Math.random() * 1.2 + 0.8) : 0.6;
                this.color = pinkColors[Math.floor(Math.random() * pinkColors.length)];
                this.alpha = this.isOutline ? (0.5 + Math.random() * 0.5) : 0.2;
            }

            draw(beat) {
                const x = this.origX * settings.heartSize * beat;
                const y = this.origY * settings.heartSize * beat;
                const z = this.origZ * settings.heartSize;
                const scale = settings.eyeDistance / (settings.eyeDistance + z);
                const screenX = x * scale + width / 2;
                const screenY = y * scale + height / 2;
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                if (this.isOutline && this.alpha > 0.8) {
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = this.color;
                }
                ctx.beginPath();
                ctx.arc(screenX, screenY, this.size * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        let particlesArray = [];
        for (let i = 0; i < settings.particleCount; i++) {
            particlesArray.push(new Particle());
        }

        function drawCenterText(beat) {
            ctx.save();
            ctx.translate(width / 2, height / 2);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 80 * beat);
            grad.addColorStop(0, "rgba(255, 20, 147, 0.15)");
            grad.addColorStop(1, "rgba(5, 0, 5, 0)");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, 80 * beat, 0, Math.PI * 2);
            ctx.fill();
            const textScale = 1 + (beat - 1) * 0.4;
            ctx.scale(textScale, textScale);
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#FF1493";
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "bold 32px 'Microsoft YaHei', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("晓看天色暮看云", 0, 0);
            ctx.restore();
        }

        function render() {
            ctx.fillStyle = "rgba(5, 0, 5, 0.45)";
            ctx.fillRect(0, 0, width, height);
            drawRain();
            const time = Date.now() * 0.0015;
            const beat = 1 + Math.pow(Math.sin(time), 2) * 0.05;
            particlesArray.forEach(p => p.draw(beat));
            drawCenterText(beat);
            requestAnimationFrame(render);
        }

        resize();
        render();
    </script>
</body>
</html>
